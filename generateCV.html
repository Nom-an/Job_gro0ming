<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Generator</title>
    <!-- Include jsPDF from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #cv-form {
            width: 50%;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 10px;
        }
        label {
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- Form to gather user information -->
    <div id="cv-form">
        <h2>Enter Your Information to Generate a Professional CV</h2>
        <form id="cvData">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="summary">Personal Summary:</label>
            <textarea id="summary" name="summary" rows="4" placeholder="Write a short professional summary about yourself" required></textarea>

            <label for="education">Education:</label>
            <textarea id="education" name="education" rows="4" placeholder="Mention your qualifications (e.g., Degree, University, Year)" required></textarea>

            <label for="experience">Work Experience:</label>
            <textarea id="experience" name="experience" rows="4" placeholder="Describe your work experience (e.g., Job Title, Company, Duration, Responsibilities)" required></textarea>

            <label for="projects">Projects:</label>
            <textarea id="projects" name="projects" rows="3" placeholder="Mention any projects relevant to the job"></textarea>

            <label for="certifications">Certifications:</label>
            <textarea id="certifications" name="certifications" rows="3" placeholder="List your certifications"></textarea>

            <label for="skills">Skills:</label>
            <textarea id="skills" name="skills" rows="3" placeholder="List your relevant skills" required></textarea>

            <label for="references">References:</label>
            <textarea id="references" name="references" rows="3" placeholder="Provide references (optional)"></textarea>

            <button type="button" onclick="generatePDF()">Generate and Download CV</button>
            <a style="text-decoration: none;" href="./sujoggg1/index.php">Home</a>
        </form>
    </div>

    <script>
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Get form values
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const summary = document.getElementById("summary").value;
            const education = document.getElementById("education").value;
            const experience = document.getElementById("experience").value;
            const projects = document.getElementById("projects").value;
            const certifications = document.getElementById("certifications").value;
            const skills = document.getElementById("skills").value;
            const references = document.getElementById("references").value;

            // Formatting the CV
            doc.setFontSize(22);
            doc.setFont("helvetica", "bold");
            doc.text(name, 10, 20);  // Name at top

            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(`Email: ${email}`, 10, 30);  // Email
            doc.text(`Phone: ${phone}`, 10, 35);  // Phone number

            // Section: Personal Summary
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("Personal Summary", 10, 50);
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(summary, 10, 55, { maxWidth: 180 });

            // Section: Education
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("Education", 10, 75);
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(education, 10, 80, { maxWidth: 180 });

            // Section: Work Experience
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("Work Experience", 10, 100);
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(experience, 10, 105, { maxWidth: 180 });

            // Section: Projects
            if (projects) {
                doc.setFontSize(16);
                doc.setFont("helvetica", "bold");
                doc.text("Projects", 10, 130);
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                doc.text(projects, 10, 135, { maxWidth: 180 });
            }

            // Section: Certifications
            if (certifications) {
                doc.setFontSize(16);
                doc.setFont("helvetica", "bold");
                doc.text("Certifications", 10, 155);
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                doc.text(certifications, 10, 160, { maxWidth: 180 });
            }

            // Section: Skills
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("Skills", 10, 180);
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(skills, 10, 185, { maxWidth: 180 });

            // Section: References
            if (references) {
                doc.setFontSize(16);
                doc.setFont("helvetica", "bold");
                doc.text("References", 10, 205);
                doc.setFontSize(12);
                doc.setFont("helvetica", "normal");
                doc.text(references, 10, 210, { maxWidth: 180 });
            }
            
            // Save CV to the server
            const pdfData = doc.output('blob');
            // Upload PDF to server using FormData
            const formData = new FormData();
            formData.append('pdf', pdfData, `${name}_CV.pdf`);
            formData.append('email', email);
            fetch('save_cv.php', {
                method: 'POST',
                body: formData
            }).then(response => {
                if (response.ok) {
                    alert('CV has been saved successfully!');
                } else {
                    alert('Failed to save CV');
                }
            }).catch(error => {
                console.error('Error:', error);
                alert('An error occurred while saving the CV.');
            });
            
            // for download locally
            doc.save(`${name}_CV.pdf`);
        }
    </script>

</body>
</html>
